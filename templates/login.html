{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<style>

.auth-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:70vh;
}

.form-box{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.form-box h2{
    text-align:center;
    margin-bottom:25px;
    font-size:32px;
}

.input-group{
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

.input-group input::placeholder{
    color:#cbd5e1;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.message{
    text-align:center;
    margin-top:15px;
    color:#facc15;
}

.links{
    text-align:center;
    margin-top:15px;
    color:#cbd5e1;
}

.links a{
    color:#93c5fd;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}

</style>

<div class="auth-container">

    <div class="form-box">

        <h2>Login</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}

        <div class="links">
            Don't have an account?
            <a href="{% url 'register' %}">Register</a>
        </div>

    </div>

</div>

{% endblock %}
