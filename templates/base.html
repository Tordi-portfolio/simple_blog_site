<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}My Django Site{% endblock %}</title>

    <style>

        /* RESET */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Segoe UI", Arial, sans-serif;
        }

        body{
            background: radial-gradient(circle at top, #0f172a, #020617);
            color:#e2e8f0;
            min-height:100vh;
        }

        /* NAVBAR */
        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px 60px;
            background: rgba(30, 58, 138, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position:sticky;
            top:0;
            z-index:1000;
        }

        .logo{
            font-size:22px;
            font-weight:700;
            letter-spacing:1px;
            color:#fff;
        }

        .nav-links{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
        }

        .nav-links a{
            text-decoration:none;
            color:#cbd5e1;
            padding:10px 16px;
            border-radius:10px;
            transition:0.3s ease;
            font-size:14px;
        }

        .nav-links a:hover{
            background:rgba(37, 99, 235, 0.6);
            color:#fff;
            transform: translateY(-1px);
        }

        .active{
            background:#2563eb;
            color:#fff !important;
            box-shadow:0 0 10px rgba(37,99,235,0.5);
        }

        /* CONTAINER */
        .container{
            width:90%;
            max-width:1100px;
            margin:40px auto;
            padding:20px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn{
            from{opacity:0; transform:translateY(10px);}
            to{opacity:1; transform:translateY(0);}
        }

        /* FOOTER */
        .footer{
            text-align:center;
            padding:20px;
            background:#020617;
            color:#94a3b8;
            border-top:1px solid rgba(255,255,255,0.05);
            margin-top:60px;
            font-size:14px;
        }

        /* MESSAGE SYSTEM */
        #message-container{
            position:fixed;
            top:90px;
            right:20px;
            z-index:9999;
            display:flex;
            flex-direction:column;
            gap:10px;
            max-width:90%;
        }

        .message{
            min-width:260px;
            max-width:320px;
            padding:14px 18px;
            border-radius:12px;
            color:white;
            font-size:14px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            backdrop-filter:blur(10px);
            animation: slideIn 0.4s ease;
            word-wrap:break-word;
        }

        /* TYPES */
        .message.success{ background:rgba(34,197,94,0.85); }
        .message.error{ background:rgba(239,68,68,0.85); }
        .message.info{ background:rgba(59,130,246,0.85); }
        .message.warning{ background:rgba(245,158,11,0.85); }

        /* ANIMATIONS */
        @keyframes slideIn{
            from{
                transform:translateX(120%);
                opacity:0;
            }
            to{
                transform:translateX(0);
                opacity:1;
            }
        }

        @keyframes fadeOut{
            to{
                opacity:0;
                transform:translateX(120%);
            }
        }

        /* MOBILE RESPONSIVE */
        @media(max-width:768px){

            .navbar{
                flex-direction:column;
                align-items:flex-start;
                padding:15px 20px;
                gap:10px;
            }

            .nav-links{
                justify-content:center;
                width:100%;
            }

            .nav-links a{
                font-size:13px;
                padding:8px 12px;
            }

            #message-container{
                top:80px;
                right:10px;
                left:10px;
                align-items:center;
            }

            .message{
                width:100%;
                max-width:100%;
            }
        }

    </style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        Tordi DjangoBlog
    </div>

    <div class="nav-links">

        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'blog' %}">Blog</a>

        {% if request.user.is_authenticated %}
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}

        <a href="http://tordiportfilio.pythonanywhere.com/">Portfolio</a>

    </div>

</div>

<!-- MESSAGES -->
<div id="message-container">

    {% for message in messages %}
        <div class="message {{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}

</div>

<!-- PAGE CONTENT -->
<div class="container">
    {% block content %}
    {% endblock %}
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Django Blog System | Built with Django
</div>

<!-- AUTO DISAPPEAR SCRIPT -->
<script>
    setTimeout(function(){

        let messages = document.querySelectorAll('.message');

        messages.forEach(function(msg){
            msg.style.animation = "fadeOut 0.5s forwards";
        });

        setTimeout(function(){
            messages.forEach(msg => msg.remove());
        }, 500);

    }, 10000);
</script>

</body>
</html>
