<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}My Django Site{% endblock %}</title>

    <style>

        /* RESET */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body{
            background: radial-gradient(circle at top, #0f172a, #020617);
            color:#e2e8f0;
            min-height:100vh;
        }

        /* NAVBAR */
        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px 60px;
            background: rgba(30, 58, 138, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position:sticky;
            top:0;
            z-index:1000;
        }

        .logo{
            font-size:22px;
            font-weight:700;
            letter-spacing:1px;
            color:#ffffff;
        }

        .nav-links{
            display:flex;
            gap:12px;
        }

        .nav-links a{
            text-decoration:none;
            color:#cbd5e1;
            padding:10px 16px;
            border-radius:10px;
            transition:0.3s ease;
            font-size:14px;
        }

        .nav-links a:hover{
            background:rgba(37, 99, 235, 0.6);
            color:#fff;
            transform: translateY(-1px);
        }

        /* ACTIVE LINK */
        .active{
            background:#2563eb;
            color:#fff !important;
            box-shadow:0 0 10px rgba(37,99,235,0.5);
        }

        /* CONTAINER */
        .container{
            width:90%;
            max-width:1100px;
            margin:40px auto;
            padding:20px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn{
            from{opacity:0; transform:translateY(10px);}
            to{opacity:1; transform:translateY(0);}
        }

        /* FOOTER */
        .footer{
            text-align:center;
            padding:20px;
            background:#020617;
            color:#94a3b8;
            border-top:1px solid rgba(255,255,255,0.05);
            margin-top:60px;
            font-size:14px;
        }

        /* MOBILE */
        @media(max-width:768px){

            .navbar{
                flex-direction:column;
                gap:12px;
                padding:15px 20px;
            }

            .nav-links{
                flex-wrap:wrap;
                justify-content:center;
            }

            .nav-links a{
                font-size:13px;
                padding:8px 12px;
            }
        }

    </style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        Tordi DjangoBlog
    </div>

    <div class="nav-links">

        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'blog' %}">Blog</a>
        {% if request.user.is_authenticated %}

        {% else %}
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'register' %}">Register</a>
        {% endif %}

        {% if request.user.is_authenticated %}
            <a href="{% url 'logout' %}">Logout</a>
        {% endif %}
        <a href="http://tordiportfilio.pythonanywhere.com/">PortFolio</a>

    </div>

</div>

<!-- PAGE CONTENT -->
<div class="container">
    {% block content %}
    {% endblock %}
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Django Blog System | Built with Django
</div>

</body>
</html>
